<head>

    <title>Document</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

            scroll-behavior: smooth;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        .Task {
            background-color: red;
        }

        .main {
            display: flex;
            justify-content: center;
            /* align-items: center; */
            flex-direction: column;
            gap: 20px;
        }
    </style>
</head>

<body>
    <h4>Hello</h4>

    <input type="color">
