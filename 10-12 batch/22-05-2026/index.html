<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        img {
            position: relative;
            transition: all 0.2s linear;
        }

        .button-section {
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            width: 100px;
            /* background-color: red; */
            gap: 10px;
        }

        .button-section button {
            padding: 5px;
            height: 25px;
            width: 25px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="button-section">
        <button>⬆</button>
        <button>⬇</button>
        <button>⬅</button>
        <button>➡</button>
    </div>

    <img src="./Img/Ball.png" alt="" height="100" style="left: 0;  top: 0;">


</body>
<script src="./script.js"></script>

</html>
