<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        .main {
            height: 100%;
            width: 100%;
            background-color: beige;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 10px;
        }

        .user {

            border: 4px solid black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 40px;
        }

        .bg {
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            height: 50px;
            width: 50px;
            border-radius: 50%;
        }

        .img-c {
            /* height: 150px;
            width: 150px; */
            background-image: url("https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");

        }

        .delete {
            background-color: red;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }

        .update {
            background-color: green;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="main">
        <button> <a href="./index.html">Add User</a> </button>
        <div class="user">
            <div class="img-c bg">
            </div>
            <h1>USERNAME</h1>
            <h4>Role</h4>
            <button id="delete" class="delete">DELETE</button>
            <button id="update" class="update">UPDATE</button>
        </div>
    </div>
</body>
<script src="./User.js"></script>

</html>
